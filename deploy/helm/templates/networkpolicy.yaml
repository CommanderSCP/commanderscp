{{/*
Hardened defaults — default-deny + explicit allows (M8, BUILD_AND_TEST.md §8 M8 items 1+the
air-gap install drill's "enforce default-deny NetworkPolicy... the drill FAILS if anything tries
to reach the internet"). Scoped to THIS chart's own pods (commanderscp.selectorLabels), not the
whole namespace, so co-locating other apps in the same namespace is unaffected.

A NetworkPolicy selecting a pod with `policyTypes: [Ingress, Egress]` and NO `ingress`/`egress`
rule list blocks ALL traffic of that type for the selected pods — that is the "default-deny" base
policy below; every subsequent policy in this file is a pure ADDITIVE allow (NetworkPolicies are
allow-lists that OR together for a given pod — never subtractive), so there is no ordering
dependency between them.
*/}}
{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "commanderscp.fullname" . }}-default-deny
  labels:
    {{- include "commanderscp.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "commanderscp.selectorLabels" . | nindent 6 }}
  policyTypes: ["Ingress", "Egress"]
---
# Egress: DNS — every other rule below resolves a hostname first.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "commanderscp.fullname" . }}-allow-dns
  labels:
    {{- include "commanderscp.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "commanderscp.selectorLabels" . | nindent 6 }}
  policyTypes: ["Egress"]
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
---
# Egress: PostgreSQL (external by default — a DNS-named host outside the cluster's pod/namespace
# selector reach, so this is a port-scoped allow rather than a podSelector one; narrow it to a
# specific CIDR via `networkPolicy.postgresCidr` for full microsegmentation in production). Also
# covers `postgres.evalInCluster` via the same port (its pod IP falls within the default private
# ranges below on essentially every real cluster). Adversarial review MAJOR #2: the UNCONFIGURED
# default is NOT "any destination" — see `commanderscp.egressToBlock` in _helpers.tpl for exactly
# what it defaults to and why (RFC1918 private ranges, not the public internet).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "commanderscp.fullname" . }}-allow-postgres
  labels:
    {{- include "commanderscp.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "commanderscp.selectorLabels" . | nindent 6 }}
  policyTypes: ["Egress"]
  egress:
    - {{- include "commanderscp.egressToBlock" .Values.networkPolicy.postgresCidr | nindent 6 }}
      ports:
        - { protocol: TCP, port: {{ .Values.postgres.port }} }
---
{{- if eq .Values.eventBus.backend "nats" }}
# Egress: NATS JetStream (optional event-bus backend, DESIGN §8) — only rendered when enabled.
# Same MAJOR #2 fix as allow-postgres above: the unconfigured default is RFC1918 private ranges,
# never "any destination".
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "commanderscp.fullname" . }}-allow-nats
  labels:
    {{- include "commanderscp.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "commanderscp.selectorLabels" . | nindent 6 }}
  policyTypes: ["Egress"]
  egress:
    - {{- include "commanderscp.egressToBlock" .Values.networkPolicy.natsCidr | nindent 6 }}
      ports:
        - { protocol: TCP, port: 4222 }
---
{{- end }}
{{- if .Values.bundledExecutor.argocd.enabled }}
# Egress: bundled Argo CD (Mode B) — api/worker AND the post-install auto-wire hook reach the
# in-cluster Argo CD API (http on 80, server.insecure) in its own namespace. In-cluster destination,
# so a precise namespaceSelector (not the RFC1918 ipBlock) is the correct allow. NOTE: when
# networkPolicy is enabled, the auto-wire hook ALSO needs egress to the kube API + DNS to read Argo
# CD's admin secret — add those to your cluster's baseline egress (a documented follow-up).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "commanderscp.fullname" . }}-allow-argocd
  labels:
    {{- include "commanderscp.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "commanderscp.selectorLabels" . | nindent 6 }}
  policyTypes: ["Egress"]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.bundledExecutor.argocd.namespace }}
      ports:
        - { protocol: TCP, port: 80 }
        - { protocol: TCP, port: 443 }
---
{{- end }}
{{- if .Values.bundledExecutor.harbor.enabled }}
# Egress: bundled Harbor (Mode B) — api/worker reach the in-cluster Harbor core API (http on 80 when
# expose.tls.enabled=false, https on 443 otherwise) to OBSERVE image/scan state. In-cluster
# destination ⇒ a precise namespaceSelector, not the RFC1918 ipBlock. Observe-only: SCP never pushes.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "commanderscp.fullname" . }}-allow-harbor
  labels:
    {{- include "commanderscp.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "commanderscp.selectorLabels" . | nindent 6 }}
  policyTypes: ["Egress"]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.bundledExecutor.harbor.namespace }}
      ports:
        - { protocol: TCP, port: 80 }
        - { protocol: TCP, port: 443 }
---
{{- end }}
# Ingress: to `api` only, from anywhere in-cluster (an ingress controller in another namespace, or
# a same-namespace client) — `worker`/`migrations` pods never accept inbound traffic at all
# (they carry the same pod-selector label set, but nothing here opens ingress for them since the
# port restriction below only ever matches the `api` container's actual listening port on pods
# that have it — a `worker` pod without anything listening on 8080 is unaffected either way).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "commanderscp.fullname" . }}-allow-ingress-to-api
  labels:
    {{- include "commanderscp.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "commanderscp.apiSelectorLabels" . | nindent 6 }}
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - { protocol: TCP, port: 8080 }
---
{{- if .Values.postgres.evalInCluster.enabled }}
# Ingress: to the EVAL in-cluster Postgres pod, from this chart's own pods only (api/worker/
# migrations). The `allow-postgres` EGRESS rule above lets api/worker/migrations SEND traffic to
# port 5432, but the eval Postgres pod is ITSELF selected by the default-deny policy (it carries
# the same `commanderscp.selectorLabels`) — without this explicit INGRESS allow on the postgres-eval
# pod's own side, the connection is silently dropped (a TCP-level timeout, not a clean "connection
# refused" — discovered and confirmed against a real kind cluster while building this chart).
# EXTERNAL Postgres (the default) never needs this: it sits outside the cluster's NetworkPolicy
# enforcement entirely.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "commanderscp.fullname" . }}-allow-ingress-to-postgres-eval
  labels:
    {{- include "commanderscp.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "commanderscp.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgres-eval
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "commanderscp.selectorLabels" . | nindent 14 }}
      ports:
        - { protocol: TCP, port: 5432 }
{{- end }}
{{- range .Values.networkPolicy.extraIngressRules }}
---
{{ toYaml . }}
{{- end }}
{{- range .Values.networkPolicy.extraEgressRules }}
---
{{ toYaml . }}
{{- end }}
{{- end }}
