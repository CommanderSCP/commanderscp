{{/*
Getting-started path: when `postgres.existingSecret`/`appSecrets.existingSecret` are unset, the
chart generates its own Secrets with random values — persisted across `helm upgrade` via `lookup`
(Helm's standard "generate once, keep forever" pattern) so passwords never rotate under an
in-place upgrade. Production deployments SHOULD set `existingSecret` to a Secret managed by the
org's own secrets tooling (external-secrets, Vault CSI, sealed-secrets, ...) instead — this
generated path exists so `helm install` still works with zero pre-created secrets, the same
five-minute-value promise the two-container compose stack makes (BUILD_AND_TEST.md §5.2).

NOTE: `lookup` returns empty results under `helm template`/`--dry-run` (no live cluster to query)
— that's fine for THIS chart's own template-verification CI gate (deploy/helm/README.md "Testing
this chart"), which only asserts structure, never specific secret values. A real `helm
install`/`upgrade` against a live cluster gets the real persist-across-upgrades behavior.

HOOK ORDERING (empirically required — discovered while verifying this chart against a real kind
cluster): the migrations Job is a `pre-install,pre-upgrade` hook, which means it runs BEFORE the
main release's normal resources (including a plain, non-hook Secret) are ever created. A Secret
these hooks depend on must therefore ALSO be a hook, at a LOWER weight so it's created first —
`helm.sh/hook-weight: "-10"` here vs. the migrations Job's default `"0"`.

DELETE POLICY (also empirically required — a SECOND real bug caught against a live kind cluster):
Helm's DEFAULT hook-delete-policy, when none is specified at all, is `before-hook-creation` — NOT
"never delete". That means an unannotated hook Secret gets DELETED AND RECREATED on every
subsequent `helm upgrade`, which for `postgres-eval`'s admin password (below) would silently
desync it from whatever the running eval Postgres was actually initialized with, and for THIS
Secret would rotate the cookie/master-key on every upgrade — losing session validity and making
every previously-encrypted plugin secret undecryptable. `"helm.sh/hook-delete-policy": hook-failed`
(explicit) means the opposite of that default: delete ONLY if hook execution failed (cleaning up a
broken partial resource), otherwise leave the successfully-created Secret alone across every future
upgrade — which is what makes the `lookup`-based value-preservation above actually matter (without
this, `lookup` would find nothing to preserve, since the resource would already be gone by the time
this template re-renders). Confirmed against a real `helm uninstall` (this Secret persists — Helm
does not track hook-only resources as part of the uninstallable release, a separate, intentional
characteristic documented in README.md's "Uninstall" section) and a real `helm upgrade` (the Secret
and its values survive unchanged).
*/}}
{{- if not .Values.postgres.existingSecret }}
{{- $secretName := printf "%s-postgres" (include "commanderscp.fullname" .) }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $adminPassword := randAlphaNum 32 }}
{{- $appPassword := randAlphaNum 32 }}
{{- $pgbossPassword := randAlphaNum 32 }}
{{- if $existing }}
{{- $adminPassword = index $existing.data "adminPassword" | b64dec }}
{{- $appPassword = index $existing.data "appPassword" | b64dec }}
{{- $pgbossPassword = index $existing.data "pgbossPassword" | b64dec }}
{{- end }}
{{- $host := .Values.postgres.evalInCluster.enabled | ternary (printf "%s-postgres-eval" (include "commanderscp.fullname" .)) .Values.postgres.host }}
{{- $port := .Values.postgres.port | toString }}
{{- $db := .Values.postgres.database }}
{{- $adminUser := .Values.postgres.adminUser }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "commanderscp.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": hook-failed
type: Opaque
stringData:
  # Persisted for reuse on the NEXT upgrade's `lookup` above — never read directly by the app.
  adminPassword: {{ $adminPassword | quote }}
  appPassword: {{ $appPassword | quote }}
  pgbossPassword: {{ $pgbossPassword | quote }}
  {{ .Values.postgres.existingSecretKeys.admin }}: {{ printf "postgres://%s:%s@%s:%s/%s" $adminUser $adminPassword $host $port $db | quote }}
  {{ .Values.postgres.existingSecretKeys.app }}: {{ printf "postgres://scp_app:%s@%s:%s/%s" $appPassword $host $port $db | quote }}
  {{ .Values.postgres.existingSecretKeys.pgboss }}: {{ printf "postgres://scp_pgboss:%s@%s:%s/%s" $pgbossPassword $host $port $db | quote }}
{{- end }}
---
{{- if not .Values.appSecrets.existingSecret }}
{{- $secretName := printf "%s-app-secrets" (include "commanderscp.fullname" .) }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $cookieSecret := randAlphaNum 48 }}
{{- /* SCP_SECRETS_MASTER_KEY must be base64-of-exactly-32-raw-bytes (secrets/crypto.ts's
       `requireKeyLength`) — `randBytes 32` is Helm's own crypto/rand-backed generator and already
       returns base64-encoded output, unlike `randAlphaNum` (which would produce a shorter decoded
       byte string at the same character count). Persisted via `lookup` exactly like the postgres
       passwords above: a real `helm upgrade` MUST reuse the same key, or every secret already
       encrypted under the previous one becomes permanently undecryptable. */}}
{{- $masterKey := randBytes 32 }}
{{- if $existing }}
{{- $cookieSecret = index $existing.data .Values.appSecrets.existingSecretKeys.cookieSecret | b64dec }}
{{- $masterKey = index $existing.data .Values.appSecrets.existingSecretKeys.secretsMasterKey | b64dec }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "commanderscp.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": hook-failed
type: Opaque
stringData:
  {{ .Values.appSecrets.existingSecretKeys.cookieSecret }}: {{ $cookieSecret | quote }}
  {{ .Values.appSecrets.existingSecretKeys.secretsMasterKey }}: {{ $masterKey | quote }}
{{- end }}
