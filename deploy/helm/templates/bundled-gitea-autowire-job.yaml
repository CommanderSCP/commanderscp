{{- if .Values.bundledExecutor.gitea.enabled }}
{{- $g := .Values.bundledExecutor.gitea -}}
{{- $ns := $g.namespace -}}
{{- $sa := printf "%s-gitea-autowire" (include "commanderscp.fullname" .) -}}
{{- $tokenKey := "bundled-gitea-token" -}}
{{/*
Bundled Gitea auto-wire — post-install,post-upgrade hook (M15.1c, the "zero token plumbing" step for
the default bundled registry, ADR-0012). Runs `bundled-gitea-autowire-bin.js`: waits for the bundled
Gitea + its SCP-generated admin secret, basic-auths as the admin account, mints a SCOPED (write
repository + package only, never admin) API token, and stores it in SCP's encrypted secret store as
'{{ $tokenKey }}'. Post-install so it runs AFTER the migrations pre-hook, the api Deployment (which
seeds the bootstrap org), AND the bundled Gitea are up. It talks to the SCP DB with the same admin
creds the migrations Job uses (install-time bootstrap, not scpd at runtime) and reads Gitea's admin
secret cross-namespace via a scoped Role in {{ $ns }} — it never holds Gitea's admin password at
runtime, only the scoped API token derived from it.
*/}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $sa }}
  labels:
    {{- include "commanderscp.labels" . | nindent 4 }}
    app.kubernetes.io/component: gitea-autowire
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $sa }}
  namespace: {{ $ns }}
  labels:
    {{- include "commanderscp.labels" . | nindent 4 }}
    app.kubernetes.io/component: gitea-autowire
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
  # Read ONLY the SCP-generated Gitea admin secret, to basic-auth and mint the scoped token.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $sa }}
  namespace: {{ $ns }}
  labels:
    {{- include "commanderscp.labels" . | nindent 4 }}
    app.kubernetes.io/component: gitea-autowire
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $sa }}
subjects:
  - kind: ServiceAccount
    name: {{ $sa }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "commanderscp.fullname" . }}-gitea-autowire-{{ .Release.Revision }}
  labels:
    {{- include "commanderscp.labels" . | nindent 4 }}
    app.kubernetes.io/component: gitea-autowire
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 600
  template:
    metadata:
      labels:
        {{- include "commanderscp.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: gitea-autowire
    spec:
      restartPolicy: Never
      serviceAccountName: {{ $sa }}
      automountServiceAccountToken: true
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: gitea-autowire
          image: {{ include "commanderscp.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["node", "dist/bundled-gitea-autowire-bin.js"]
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          env:
            {{- include "commanderscp.commonEnv" . | nindent 12 }}
            {{- include "commanderscp.adminDbEnv" . | nindent 12 }}
            - name: SCP_GITEA_SERVER_URL
              value: http://scp-gitea-http.{{ $ns }}.svc:3000
            - name: SCP_GITEA_ADMIN_SECRET_NS
              value: {{ $ns | quote }}
            - name: SCP_GITEA_ADMIN_SECRET_NAME
              value: gitea-admin-secret
            - name: SCP_GITEA_TOKEN_NAME
              value: {{ $g.scpAccount | quote }}
            - name: SCP_GITEA_TOKEN_SECRET_KEY
              value: {{ $tokenKey | quote }}
            # Trust the in-cluster kube API CA for the cross-namespace secret read.
            - name: NODE_EXTRA_CA_CERTS
              value: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          resources:
            {{- toYaml .Values.migrations.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
