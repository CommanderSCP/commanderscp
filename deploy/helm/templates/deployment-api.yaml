apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "commanderscp.fullname" . }}-api
  labels:
    {{- include "commanderscp.apiSelectorLabels" . | nindent 4 }}
    {{- include "commanderscp.labels" . | nindent 4 }}
spec:
  {{- if not .Values.api.hpa.enabled }}
  replicas: {{ .Values.api.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "commanderscp.apiSelectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        {{- include "commanderscp.apiSelectorLabels" . | nindent 8 }}
      {{- with .Values.api.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "commanderscp.serviceAccountName" . }}
      automountServiceAccountToken: false
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        {{- include "commanderscp.waitForPostgresInitContainer" (dict "root" . "dbEnvVar" "SCP_RUNTIME_DATABASE_URL") | nindent 8 }}
      containers:
        - name: api
          image: {{ include "commanderscp.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          env:
            - name: SCP_ROLE
              value: "api"
            {{- include "commanderscp.commonEnv" . | nindent 12 }}
            {{- include "commanderscp.runtimeDbEnv" . | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
          # M9.3 (ADR-0001): when in-app federation mTLS is enabled, apps/server's ONE Fastify
          # listener speaks HTTPS for ALL traffic (there is no per-route TLS) — the probes must
          # follow, or they fail their own TLS handshake against a plain-HTTP-expecting client.
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
              {{- if .Values.federation.serverMtls.enabled }}
              scheme: HTTPS
              {{- end }}
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
              {{- if .Values.federation.serverMtls.enabled }}
              scheme: HTTPS
              {{- end }}
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: storage
              mountPath: /var/lib/scp/storage
            {{- if .Values.scanDbCache.enabled }}
            - name: scan-db
              mountPath: {{ .Values.scanDbCache.mountPath }}
            {{- end }}
            {{- if .Values.federation.mtls.enabled }}
            - name: federation-mtls
              mountPath: /etc/scp/federation-mtls
              readOnly: true
            {{- end }}
            {{- if .Values.federation.serverMtls.enabled }}
            - name: federation-server-mtls
              mountPath: /etc/scp/federation-server-mtls
              readOnly: true
            {{- if .Values.federation.serverMtls.crl.enabled }}
            - name: federation-server-mtls-crl
              mountPath: /etc/scp/federation-server-mtls-crl
              readOnly: true
            {{- end }}
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        - name: storage
          {{- if eq .Values.objectStorage.provider "filesystem" }}
          persistentVolumeClaim:
            claimName: {{ include "commanderscp.fullname" . }}-storage
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if .Values.scanDbCache.enabled }}
        - name: scan-db
          persistentVolumeClaim:
            claimName: {{ include "commanderscp.fullname" . }}-scan-db
        {{- end }}
        {{- if .Values.federation.mtls.enabled }}
        - name: federation-mtls
          secret:
            secretName: {{ .Values.federation.mtls.existingSecret }}
        {{- end }}
        {{- if .Values.federation.serverMtls.enabled }}
        - name: federation-server-mtls
          secret:
            secretName: {{ .Values.federation.serverMtls.existingSecret }}
        {{- if .Values.federation.serverMtls.crl.enabled }}
        - name: federation-server-mtls-crl
          secret:
            # A SEPARATE Secret from federation-server-mtls above (ADR-0001 §8) — refreshing the
            # CRL (which rotates far more often than CA/server-cert material) only ever touches
            # THIS Secret, never re-rolling the CA/cert/key one.
            secretName: {{ .Values.federation.serverMtls.crl.existingSecret }}
        {{- end }}
        {{- end }}
