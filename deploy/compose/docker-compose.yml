# Two-container evaluation stack (DESIGN.md §16, BUILD_AND_TEST.md §5.2): postgres:16 + scp
# (api + worker + Web UI SPA in one process, SCP_ROLE=all, local auth). `docker compose up`.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: scp
      POSTGRES_PASSWORD: scp
      POSTGRES_DB: scp
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scp -d scp"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - scp-postgres-data:/var/lib/postgresql/data

  scp:
    build:
      context: ../..
      dockerfile: Dockerfile
    environment:
      SCP_ROLE: all
      PORT: "8080"
      HOST: "0.0.0.0"
      DATABASE_URL: postgres://scp:scp@postgres:5432/scp
      # BUILD_AND_TEST.md §5.3: demo data on by default for the eval stack.
      SCP_SEED_DEMO: "true"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  scp-postgres-data:
