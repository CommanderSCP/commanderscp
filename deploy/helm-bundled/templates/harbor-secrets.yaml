{{- if .Values.bundledExecutor.harbor.enabled -}}
{{- $h := .Values.bundledExecutor.harbor -}}
{{- $ns := $h.namespace -}}
{{/*
Bundled Harbor secrets (M11.4 — the "SCP-generated secrets" approach). Harbor's Helm chart bakes
~15 secret values at TEMPLATE time; vendoring that render would freeze them into static, identical-
for-everyone credentials. Instead we vendor Harbor's manifests MINUS its Secrets (bundled-harbor.yaml)
and regenerate the Secrets here — random per install, PERSISTED across `helm upgrade` via `lookup`
(so passwords never rotate under an in-place upgrade and desync Harbor's already-initialized DB /
registry). CROSS-REFERENCES are honored: one Postgres password shared by harbor-core + harbor-database;
one registry-credential password shared by harbor-core + harbor-jobservice + bcrypt'd into the
registry htpasswd; one self-signed token-signing cert in harbor-core (core signs registry-auth JWTs,
the registry verifies them from this same secret — no baked cert exists in the vendored manifests).
Regular main-phase resources (not hooks): Helm orders Namespace → Secret → Deployment, so these exist
before Harbor's pods start; `lookup` gives the generate-once-keep-forever behavior on upgrade.
*/}}
{{- $core := lookup "v1" "Secret" $ns "harbor-core" -}}
{{- $job := lookup "v1" "Secret" $ns "harbor-jobservice" -}}
{{- $reg := lookup "v1" "Secret" $ns "harbor-registry" -}}
{{- $ht := lookup "v1" "Secret" $ns "harbor-registry-htpasswd" -}}
{{- $pgPassword := randAlphaNum 24 -}}
{{- $regCredPassword := randAlphaNum 16 -}}
{{- $adminPassword := $h.adminPassword | default (randAlphaNum 16) -}}
{{- $secretKey := randAlphaNum 16 -}}
{{- $coreSecret := randAlphaNum 16 -}}
{{- $csrfKey := randAlphaNum 32 -}}
{{- $jobSecret := randAlphaNum 16 -}}
{{- $regHttpSecret := randAlphaNum 16 -}}
{{- $cert := genSelfSignedCert "harbor-token-service" (list) (list "harbor-token-service") 3650 -}}
{{- $tlsCrt := $cert.Cert -}}
{{- $tlsKey := $cert.Key -}}
{{- if $core -}}
{{- $pgPassword = index $core.data "POSTGRESQL_PASSWORD" | b64dec -}}
{{- $regCredPassword = index $core.data "REGISTRY_CREDENTIAL_PASSWORD" | b64dec -}}
{{- $adminPassword = index $core.data "HARBOR_ADMIN_PASSWORD" | b64dec -}}
{{- $secretKey = index $core.data "secretKey" | b64dec -}}
{{- $coreSecret = index $core.data "secret" | b64dec -}}
{{- $csrfKey = index $core.data "CSRF_KEY" | b64dec -}}
{{- $tlsCrt = index $core.data "tls.crt" | b64dec -}}
{{- $tlsKey = index $core.data "tls.key" | b64dec -}}
{{- end -}}
{{- if $job }}{{- $jobSecret = index $job.data "JOBSERVICE_SECRET" | b64dec -}}{{- end -}}
{{- if $reg }}{{- $regHttpSecret = index $reg.data "REGISTRY_HTTP_SECRET" | b64dec -}}{{- end -}}
{{- $htpasswd := htpasswd "harbor_registry_user" $regCredPassword -}}
{{- if $ht }}{{- $htpasswd = index $ht.data "REGISTRY_HTPASSWD" | b64dec -}}{{- end -}}
{{- $labels := include "commanderscp.labels" . -}}
apiVersion: v1
kind: Secret
metadata:
  name: harbor-core
  namespace: {{ $ns }}
  labels:
    {{- $labels | nindent 4 }}
type: Opaque
stringData:
  secretKey: {{ $secretKey | quote }}
  secret: {{ $coreSecret | quote }}
  tls.key: {{ $tlsKey | quote }}
  tls.crt: {{ $tlsCrt | quote }}
  HARBOR_ADMIN_PASSWORD: {{ $adminPassword | quote }}
  POSTGRESQL_PASSWORD: {{ $pgPassword | quote }}
  REGISTRY_CREDENTIAL_PASSWORD: {{ $regCredPassword | quote }}
  CSRF_KEY: {{ $csrfKey | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: harbor-database
  namespace: {{ $ns }}
  labels:
    {{- $labels | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ $pgPassword | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: harbor-jobservice
  namespace: {{ $ns }}
  labels:
    {{- $labels | nindent 4 }}
type: Opaque
stringData:
  JOBSERVICE_SECRET: {{ $jobSecret | quote }}
  REGISTRY_CREDENTIAL_PASSWORD: {{ $regCredPassword | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: harbor-registry
  namespace: {{ $ns }}
  labels:
    {{- $labels | nindent 4 }}
type: Opaque
stringData:
  REGISTRY_HTTP_SECRET: {{ $regHttpSecret | quote }}
  REGISTRY_REDIS_PASSWORD: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: harbor-registry-htpasswd
  namespace: {{ $ns }}
  labels:
    {{- $labels | nindent 4 }}
type: Opaque
stringData:
  REGISTRY_HTPASSWD: {{ $htpasswd | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: harbor-registryctl
  namespace: {{ $ns }}
  labels:
    {{- $labels | nindent 4 }}
type: Opaque
---
apiVersion: v1
kind: Secret
metadata:
  name: harbor-trivy
  namespace: {{ $ns }}
  labels:
    {{- $labels | nindent 4 }}
type: Opaque
stringData:
  redisURL: "redis://harbor-redis:6379/5?idle_timeout_seconds=30"
  gitHubToken: ""
{{- end }}
