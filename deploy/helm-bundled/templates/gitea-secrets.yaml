{{- if .Values.bundledExecutor.gitea.enabled -}}
{{- $g := .Values.bundledExecutor.gitea -}}
{{- $ns := $g.namespace -}}
{{/*
Bundled Gitea secrets (M15.1c — the "SCP-generated secrets" approach, mirroring the removed
bundled-harbor-secrets.yaml). The upstream Gitea chart bakes its Secrets at TEMPLATE time —
including a STATIC default admin password ("gitea_admin" / "r8sA8CPHD9!bt6d") and, if you set them
via values, a frozen SECRET_KEY / INTERNAL_TOKEN — so vendoring that render would freeze
identical-for-everyone credentials into the manifest. Instead we vendor Gitea's manifests MINUS
its Secrets (vendor/gitea/install-no-secrets.yaml, rendered with gitea.admin.existingSecret) and
regenerate the four Secrets the Deployment mounts HERE — random per install, PERSISTED across
`helm upgrade` via `lookup` so they never rotate under an in-place upgrade (which would desync
Gitea's already-initialized admin user, break every existing session, and invalidate the running
process's internal API token):

  - gitea-admin-secret          the admin user Gitea's configure-gitea init container creates +
                                keeps in sync (username + password). The auto-wire hook basic-auths
                                as this user to mint a SCOPED (non-admin) API token. Password honors
                                an operator override (bundledExecutor.gitea.adminPassword), else
                                random. This account IS a Gitea admin, but SCP only ever holds the
                                scoped token derived from it — never this password at runtime.
  - scp-gitea-inline-config     the app.ini sections env2ini imports. The `security` section carries
                                the generate-once SECRET_KEY (cookie/2FA/data encryption) and
                                INTERNAL_TOKEN (internal API auth) — persisted so sessions and the
                                internal API survive `helm upgrade`.
  - scp-gitea                   the env2ini `config_environment.sh` machinery (static, non-secret;
                                vendored verbatim under vendor/gitea/config/).
  - scp-gitea-init              the init scripts: directory setup, gpg env, and configure_gitea.sh
                                (static, non-secret; vendored verbatim under vendor/gitea/init/).

Regular main-phase resources (not hooks): Helm orders Namespace -> Secret -> Deployment, so these
exist before Gitea's pod starts; `lookup` gives the generate-once-keep-forever behavior on upgrade.
Secret NAMES are the fixed ones the vendored Deployment references (release-independent).
*/}}
{{- $labels := include "commanderscp.labels" . -}}
{{/* --- admin creds: generate once, persist across upgrade --------------------------------- */}}
{{- $adminSecret := lookup "v1" "Secret" $ns "gitea-admin-secret" -}}
{{- $adminUsername := $g.scpAccount -}}
{{- $adminPassword := $g.adminPassword | default (randAlphaNum 24) -}}
{{- if $adminSecret -}}
{{- $adminUsername = index $adminSecret.data "username" | b64dec -}}
{{- $adminPassword = index $adminSecret.data "password" | b64dec -}}
{{- end -}}
{{/* --- SECRET_KEY + INTERNAL_TOKEN: generate once, persist (extracted from the inline-config
     Secret's own `security` section on upgrade — the value lives where it is consumed) --------- */}}
{{- $inlineExisting := lookup "v1" "Secret" $ns "scp-gitea-inline-config" -}}
{{- $secretKey := randAlphaNum 64 -}}
{{- $internalToken := randAlphaNum 105 -}}
{{- if $inlineExisting -}}
{{- $sec := index $inlineExisting.data "security" | b64dec -}}
{{- $foundKey := regexFind "(?m)^SECRET_KEY=.+$" $sec | trimPrefix "SECRET_KEY=" -}}
{{- $foundToken := regexFind "(?m)^INTERNAL_TOKEN=.+$" $sec | trimPrefix "INTERNAL_TOKEN=" -}}
{{- if $foundKey }}{{- $secretKey = $foundKey -}}{{- end -}}
{{- if $foundToken }}{{- $internalToken = $foundToken -}}{{- end -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: gitea-admin-secret
  namespace: {{ $ns }}
  labels:
    {{- $labels | nindent 4 }}
    app.kubernetes.io/component: bundled-gitea
type: Opaque
stringData:
  username: {{ $adminUsername | quote }}
  password: {{ $adminPassword | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: scp-gitea-inline-config
  namespace: {{ $ns }}
  labels:
    {{- $labels | nindent 4 }}
    app.kubernetes.io/component: bundled-gitea
type: Opaque
stringData:
  _generals_: ""
  cache: |-
    ADAPTER=memory
    HOST=
  database: DB_TYPE=sqlite3
  indexer: ISSUE_INDEXER_TYPE=db
  metrics: ENABLED=false
  queue: |-
    CONN_STR=
    TYPE=level
  repository: ROOT=/data/git/gitea-repositories
  security: |-
    INSTALL_LOCK=true
    SECRET_KEY={{ $secretKey }}
    INTERNAL_TOKEN={{ $internalToken }}
  server: |-
    APP_DATA_PATH=/data
    DOMAIN=git.example.com
    ENABLE_PPROF=false
    HTTP_PORT=3000
    PROTOCOL=http
    ROOT_URL=http://git.example.com
    SSH_DOMAIN=git.example.com
    SSH_LISTEN_PORT=2222
    SSH_PORT=22
    START_SSH_SERVER=true
  session: |-
    PROVIDER=memory
    PROVIDER_CONFIG=
---
apiVersion: v1
kind: Secret
metadata:
  name: scp-gitea
  namespace: {{ $ns }}
  labels:
    {{- $labels | nindent 4 }}
    app.kubernetes.io/component: bundled-gitea
type: Opaque
stringData:
  config_environment.sh: |-
    {{- .Files.Get "vendor/gitea/config/config_environment.sh" | nindent 4 }}
---
apiVersion: v1
kind: Secret
metadata:
  name: scp-gitea-init
  namespace: {{ $ns }}
  labels:
    {{- $labels | nindent 4 }}
    app.kubernetes.io/component: bundled-gitea
type: Opaque
stringData:
  configure_gpg_environment.sh: |-
    {{- .Files.Get "vendor/gitea/init/configure_gpg_environment.sh" | nindent 4 }}
  init_directory_structure.sh: |-
    {{- .Files.Get "vendor/gitea/init/init_directory_structure.sh" | nindent 4 }}
  configure_gitea.sh: |-
    {{- .Files.Get "vendor/gitea/init/configure_gitea.sh" | nindent 4 }}
{{- end }}
