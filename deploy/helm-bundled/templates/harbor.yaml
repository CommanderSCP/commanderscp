{{- if .Values.bundledExecutor.harbor.enabled -}}
{{- $h := .Values.bundledExecutor.harbor -}}
# =============================================================================================
# Bundled Harbor (Mode B — OCI registry + Trivy scanner). Vendored, UNMODIFIED upstream v2.15.1
# (deploy/helm/vendor/harbor/install-no-secrets.yaml) rendered into {{ $h.namespace }} via
# commanderscp.renderVendoredBackend, with each of the nine goharbor images retargeted INDIVIDUALLY
# (full ref, so the air-gap install.sh can pin each by @digest — a single registry-prefix rewrite
# can't carry a digest, and install.sh's guarantee is digest-pinned images). Defaults are the
# upstream refs so a CONNECTED install works out of the box; the air-gap install.sh overrides all
# nine with `<registry>/<name>:<version>@<digest>`. Harbor's own Secrets are NOT vendored — they are
# SCP-generated per install in bundled-harbor-secrets.yaml. SCP coordinates Harbor OBSERVE-ONLY: it
# reads image/scan state through a scoped read token, never Harbor's admin/infra credentials.
# =============================================================================================
{{- include "commanderscp.renderVendoredBackend" (dict
    "ctx" .
    "namespace" $h.namespace
    "component" "bundled-harbor"
    "manifest" (.Files.Get "vendor/harbor/install-no-secrets.yaml")
    "replaces" (list
      (list "docker.io/goharbor/harbor-core:v2.15.1" $h.coreImage)
      (list "docker.io/goharbor/harbor-db:v2.15.1" $h.dbImage)
      (list "docker.io/goharbor/harbor-jobservice:v2.15.1" $h.jobserviceImage)
      (list "docker.io/goharbor/harbor-portal:v2.15.1" $h.portalImage)
      (list "docker.io/goharbor/harbor-registryctl:v2.15.1" $h.registryctlImage)
      (list "docker.io/goharbor/registry-photon:v2.15.1" $h.registryImage)
      (list "docker.io/goharbor/nginx-photon:v2.15.1" $h.nginxImage)
      (list "docker.io/goharbor/redis-photon:v2.15.1" $h.redisImage)
      (list "docker.io/goharbor/trivy-adapter-photon:v2.15.1" $h.trivyImage)
    )
  ) }}
{{- end }}
