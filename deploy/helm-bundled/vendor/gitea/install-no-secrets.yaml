# =============================================================================================
# VENDORED, UNMODIFIED Gitea (Mode B — the default bundled unified registry: image + code +
# package, ADR-0012). Rendered from the upstream Gitea Helm chart gitea-charts/gitea v12.6.0
# (app 1.26.1) with the SQLite / single-replica / no-external-DB / no-valkey minimal profile:
#
#   helm template scp-gitea gitea-charts/gitea --version 12.6.0 --namespace scp-gitea \
#     --set postgresql.enabled=false --set postgresql-ha.enabled=false \
#     --set valkey-cluster.enabled=false --set valkey.enabled=false \
#     --set replicaCount=1 --set gitea.config.database.DB_TYPE=sqlite3 \
#     --set gitea.admin.existingSecret=gitea-admin-secret
#
# Exactly ONE gitea image (docker.gitea.com/gitea:1.26.1-rootless) + ONE busybox init image; ZERO
# postgres/valkey/redis/bitnami — Gitea runs self-contained on SQLite + a single PVC. Every
# kind: Secret document from the upstream render is STRIPPED here (the config-env / init-script /
# inline-config machinery secrets AND the admin secret) — they are SCP-GENERATED per install in
# templates/gitea-secrets.yaml (random-per-install, persisted across `helm upgrade` via `lookup`),
# mirroring the removed Harbor 'install-no-secrets' pattern. The helm-test connection Pod is also
# stripped (not part of the deployment). `gitea.admin.existingSecret=gitea-admin-secret` makes the
# admin username/password flow in from that SCP-generated secret via secretKeyRef instead of a
# baked-in plaintext default. install.sh retargets both images by @digest for air-gap.
# =============================================================================================
---
kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: gitea-shared-storage
  namespace: scp-gitea
  annotations:
    helm.sh/resource-policy: keep
  labels:
    {}
spec:
  accessModes:
    - ReadWriteOnce
  volumeMode: Filesystem
  
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: scp-gitea-http
  namespace: scp-gitea
  labels:
    helm.sh/chart: gitea-12.6.0
    app: gitea
    app.kubernetes.io/name: gitea
    app.kubernetes.io/instance: scp-gitea
    app.kubernetes.io/version: "1.26.1"
    version: "1.26.1"
    app.kubernetes.io/managed-by: Helm
  annotations:
    {}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - name: http
    port: 3000
    targetPort: 
  selector:
    app.kubernetes.io/name: gitea
    app.kubernetes.io/instance: scp-gitea
---
apiVersion: v1
kind: Service
metadata:
  name: scp-gitea-ssh
  namespace: scp-gitea
  labels:
    helm.sh/chart: gitea-12.6.0
    app: gitea
    app.kubernetes.io/name: gitea
    app.kubernetes.io/instance: scp-gitea
    app.kubernetes.io/version: "1.26.1"
    version: "1.26.1"
    app.kubernetes.io/managed-by: Helm
  annotations:
    {}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - name: ssh
    port: 22
    targetPort: 2222
    protocol: TCP
  selector:
    app.kubernetes.io/name: gitea
    app.kubernetes.io/instance: scp-gitea
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scp-gitea
  namespace: scp-gitea
  annotations:
  labels:
    helm.sh/chart: gitea-12.6.0
    app: gitea
    app.kubernetes.io/name: gitea
    app.kubernetes.io/instance: scp-gitea
    app.kubernetes.io/version: "1.26.1"
    version: "1.26.1"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 100%
  selector:
    matchLabels:
      app.kubernetes.io/name: gitea
      app.kubernetes.io/instance: scp-gitea
  template:
    metadata:
      annotations:
        checksum/config: 4fb6212d0a891551cd854389ecc0c0828cc7368c812ac9144757f02b062888cc
      labels:
        helm.sh/chart: gitea-12.6.0
        app: gitea
        app.kubernetes.io/name: gitea
        app.kubernetes.io/instance: scp-gitea
        app.kubernetes.io/version: "1.26.1"
        version: "1.26.1"
        app.kubernetes.io/managed-by: Helm
    spec:
      
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: init-directories
          image: "docker.gitea.com/gitea:1.26.1-rootless"
          imagePullPolicy: IfNotPresent
          command:
            - "/usr/sbinx/init_directory_structure.sh"
          env:
            - name: GITEA_APP_INI
              value: /data/gitea/conf/app.ini
            - name: GITEA_CUSTOM
              value: /data/gitea
            - name: GITEA_WORK_DIR
              value: /data
            - name: GITEA_TEMP
              value: /tmp/gitea
          volumeMounts:
            - name: init
              mountPath: /usr/sbinx
            - name: temp
              mountPath: /tmp
            - name: data
              mountPath: /data
            
          resources:
            limits: {}
            requests:
              cpu: 100m
              memory: 128Mi
        - name: init-app-ini
          image: "docker.gitea.com/gitea:1.26.1-rootless"
          imagePullPolicy: IfNotPresent
          command:
          - "/usr/sbinx/config_environment.sh"
          env:
            - name: GITEA_APP_INI
              value: /data/gitea/conf/app.ini
            - name: GITEA_CUSTOM
              value: /data/gitea
            - name: GITEA_WORK_DIR
              value: /data
            - name: GITEA_TEMP
              value: /tmp/gitea
            - name: TMP_EXISTING_ENVS_FILE
              value: /tmp/existing-envs
            - name: ENV_TO_INI_MOUNT_POINT
              value: /env-to-ini-mounts
          volumeMounts:
            - name: config
              mountPath: /usr/sbinx
            - name: temp
              mountPath: /tmp
            - name: data
              mountPath: /data
            - name: inline-config-sources
              mountPath: /env-to-ini-mounts/inlines/
            
          resources:
            limits: {}
            requests:
              cpu: 100m
              memory: 128Mi
        - name: configure-gitea
          image: "docker.gitea.com/gitea:1.26.1-rootless"
          command:
          - "/usr/sbinx/configure_gitea.sh"
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 1000
          env:
            - name: GITEA_APP_INI
              value: /data/gitea/conf/app.ini
            - name: GITEA_CUSTOM
              value: /data/gitea
            - name: GITEA_WORK_DIR
              value: /data
            - name: GITEA_TEMP
              value: /tmp/gitea
            - name: HOME
              value: /data/gitea/git
            - name: GITEA_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  key:  username
                  name: gitea-admin-secret
            - name: GITEA_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  key:  password
                  name: gitea-admin-secret
            - name: GITEA_ADMIN_PASSWORD_MODE
              value: keepUpdated
          volumeMounts:
            - name: init
              mountPath: /usr/sbinx
            - name: temp
              mountPath: /tmp
            - name: data
              mountPath: /data
            
          resources:
            limits: {}
            requests:
              cpu: 100m
              memory: 128Mi
      terminationGracePeriodSeconds: 60
      containers:
        - name: gitea
          image: "docker.gitea.com/gitea:1.26.1-rootless"
          imagePullPolicy: IfNotPresent
          env:
            # SSH Port values have to be set here as well for openssh configuration
            - name: SSH_LISTEN_PORT
              value: "2222"
            - name: SSH_PORT
              value: "22"
            - name: GITEA_APP_INI
              value: /data/gitea/conf/app.ini
            - name: GITEA_CUSTOM
              value: /data/gitea
            - name: GITEA_WORK_DIR
              value: /data
            - name: GITEA_TEMP
              value: /tmp/gitea
            - name: TMPDIR
              value: /tmp/gitea
            - name: HOME
              value: /data/gitea/git
          ports:
            - name: ssh
              containerPort: 2222
            - name: http
              containerPort: 3000
          livenessProbe:
            failureThreshold: 10
            initialDelaySeconds: 200
            periodSeconds: 10
            successThreshold: 1
            tcpSocket:
              port: http
            timeoutSeconds: 1
          readinessProbe:
            failureThreshold: 3
            initialDelaySeconds: 5
            periodSeconds: 10
            successThreshold: 1
            tcpSocket:
              port: http
            timeoutSeconds: 1
          resources:
            {}
          volumeMounts:
            - name: temp
              mountPath: /tmp
            - name: data
              mountPath: /data
            
      volumes:
        - name: init
          secret:
            secretName: scp-gitea-init
            defaultMode: 110
        - name: config
          secret:
            secretName: scp-gitea
            defaultMode: 110
        - name: inline-config-sources
          secret:
            secretName: scp-gitea-inline-config
        - name: temp
          emptyDir: {}
        - name: data
          persistentVolumeClaim:
            claimName: gitea-shared-storage
