# =============================================================================================
# CommanderSCP Standard Stack — bundled executor backends (Mode B, ADR-0002).
#
# This chart is delivered via `helm template … | kubectl apply --server-side` (see
# scripts/scp-bundled.sh + deploy/airgap/assets/install.sh), NOT `helm install` — the vendored
# manifests exceed Helm's 1 MB release-Secret limit. Each backend is off by default; enable exactly
# the one you are applying. `--server-side` is REQUIRED: the vendored CRDs are large enough that
# client-side apply's last-applied-configuration annotation would overflow the per-object limit.
# =============================================================================================

# Federation role of the outpost this bundle is being applied to (commander | outpost | retrans).
# METADATA ONLY — it drives a CHART-RENDER-TIME self-consistency LINT (M15.4), not any SCP runtime
# authority. The operator sets BOTH this role AND the bundledExecutor.*.enabled flags below at
# install time, so pairing an install-time role with the install-time enablement lets tooling
# (tools/helm-verify) catch a MISCONFIGURATION: a role enabling a bundled backend it should not run
# (e.g. a `retrans` CDS-boundary relay — a validate-and-forward node, not an execution site —
# enabling any executor at all). This is deliberately NOT runtime enforcement: the runtime
# `self_domain.role` (commander|outpost|retrans, set post-install via the federation API) is
# ADVISORY metadata with no bearing on a Helm install-time value and no graph representation of
# bundled-backend enablement, so runtime enforcement here would be a fork (owner decision, M15.4).
# The allowed-backends-per-role matrix lives in tools/helm-verify/src/verify.ts; invalid values are
# rejected at render (see commanderscp.federationRole in templates/_helpers.tpl).
federationRole: commander

bundledExecutor:
  argocd:
    enabled: false
    # Own namespace so the bundled backend keeps its own RBAC + cluster credentials, isolated from
    # scpd (which never gets those — SCP only ever holds the scoped Argo CD API token). Must match
    # the slim bundledExecutor.argocd.namespace in the MAIN chart's values (the auto-wire hook +
    # NetworkPolicy there target this namespace).
    namespace: scp-argocd
    # VENDORED, RETARGETABLE image refs. Defaults are the upstream refs so a CONNECTED enable works
    # out of the box (`scp-bundled.sh enable argocd`, zero flags); the air-gap install.sh rewrites
    # them to the customer registry at a pinned digest.
    image: quay.io/argoproj/argocd:v3.4.5 # Argo CD (Apache-2.0)
    valkeyImage: valkey/valkey:8-alpine # Valkey (BSD-3) — Argo CD's cache; an OWNED, TESTED deviation from upstream's Redis
    # The scoped, non-admin account SCP mints in the bundled Argo CD and coordinates through. The
    # auto-wire hook (in the MAIN chart) mints its token and stores it as an SCP secret.
    scpAccount: scp-coordinator
    # Argo CD component resource requests/limits. Modest defaults sized for a coordination-tier install.
    resources:
      server:
        requests: { cpu: 100m, memory: 128Mi }
        limits: { cpu: 500m, memory: 256Mi }
      repoServer:
        requests: { cpu: 100m, memory: 128Mi }
        limits: { cpu: 500m, memory: 256Mi }
      applicationController:
        requests: { cpu: 250m, memory: 256Mi }
        limits: { cpu: "1", memory: 512Mi }
      valkey:
        requests: { cpu: 50m, memory: 64Mi }
        limits: { cpu: 200m, memory: 128Mi }
  # Argo Workflows (Mode B — bundled CI / build / test). Vendored, unmodified upstream v4.0.7;
  # off by default; two retargetable images (fail-closed when empty). Coordinated via the generic
  # pipeline executor (M10.6) — the bundle DEPLOYS it; SCP never runs CI itself.
  argoWorkflows:
    enabled: false
    namespace: scp-argo-workflows
    # Upstream defaults (connected enable works out of the box); air-gap install.sh retargets.
    serverImage: quay.io/argoproj/argocli:v4.0.7 # argo-server / UI
    controllerImage: quay.io/argoproj/workflow-controller:v4.0.7 # workflow-controller
  # Argo Events (Mode B — event sources/sensors that can feed SCP's observe() path). Vendored,
  # unmodified upstream v1.9.10; off by default; one retargetable image.
  argoEvents:
    enabled: false
    namespace: scp-argo-events
    image: quay.io/argoproj/argo-events:v1.9.10 # argo-events controller — retargeted by install.sh
  # Gitea (Mode B — the DEFAULT bundled unified registry: image + code + package, ADR-0012).
  # Vendored, unmodified upstream chart v12.6.0 (app 1.26.1) in the SQLite / single-replica /
  # no-external-DB / no-valkey minimal profile — Gitea runs self-contained on SQLite + one PVC.
  # Off by default; one retargetable image (fail-closed when empty). Its Secrets (admin creds +
  # SECRET_KEY/INTERNAL_TOKEN + config/init machinery) are SCP-generated in gitea-secrets.yaml,
  # never baked into the vendored manifest. Harbor is REMOVED from the default stack — an existing
  # Harbor is served via the IMPORT path (coordinated as an execution system), not bundled.
  gitea:
    enabled: false
    namespace: scp-gitea
    # VENDORED, RETARGETABLE image. Default is the upstream ref so a CONNECTED enable works out of
    # the box (`scp-bundled.sh enable gitea`, zero flags); the air-gap install.sh rewrites it to the
    # customer registry at a pinned digest. In chart v12.6.0 the running workload is a SINGLE image
    # (the only upstream busybox ref was the helm-test Pod, which is stripped).
    image: docker.gitea.com/gitea:1.26.1-rootless # Gitea (MIT)
    # Operator override for the bundled admin password; empty ⇒ SCP generates a random one per
    # install (persisted across upgrade via lookup). SCP only ever holds the SCOPED token derived
    # from this account at runtime, never the password.
    adminPassword: ""
    # The Gitea admin account SCP creates + coordinates through. The auto-wire hook basic-auths as
    # this account and mints a SCOPED (least-privilege, non-admin) API token, stored as an SCP secret.
    scpAccount: scp-gitea-admin
