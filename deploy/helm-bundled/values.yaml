# =============================================================================================
# CommanderSCP Standard Stack — bundled executor backends (Mode B, ADR-0002).
#
# This chart is delivered via `helm template … | kubectl apply --server-side` (see
# scripts/scp-bundled.sh + deploy/airgap/assets/install.sh), NOT `helm install` — the vendored
# manifests exceed Helm's 1 MB release-Secret limit. Each backend is off by default; enable exactly
# the one you are applying. `--server-side` is REQUIRED: the vendored CRDs are large enough that
# client-side apply's last-applied-configuration annotation would overflow the per-object limit.
# =============================================================================================
bundledExecutor:
  argocd:
    enabled: false
    # Own namespace so the bundled backend keeps its own RBAC + cluster credentials, isolated from
    # scpd (which never gets those — SCP only ever holds the scoped Argo CD API token). Must match
    # the slim bundledExecutor.argocd.namespace in the MAIN chart's values (the auto-wire hook +
    # NetworkPolicy there target this namespace).
    namespace: scp-argocd
    # VENDORED, RETARGETABLE image refs. Defaults are the upstream refs so a CONNECTED enable works
    # out of the box (`scp-bundled.sh enable argocd`, zero flags); the air-gap install.sh rewrites
    # them to the customer registry at a pinned digest.
    image: quay.io/argoproj/argocd:v3.4.5 # Argo CD (Apache-2.0)
    valkeyImage: valkey/valkey:8-alpine # Valkey (BSD-3) — Argo CD's cache; an OWNED, TESTED deviation from upstream's Redis
    # The scoped, non-admin account SCP mints in the bundled Argo CD and coordinates through. The
    # auto-wire hook (in the MAIN chart) mints its token and stores it as an SCP secret.
    scpAccount: scp-coordinator
    # Argo CD component resource requests/limits. Modest defaults sized for a coordination-tier install.
    resources:
      server:
        requests: { cpu: 100m, memory: 128Mi }
        limits: { cpu: 500m, memory: 256Mi }
      repoServer:
        requests: { cpu: 100m, memory: 128Mi }
        limits: { cpu: 500m, memory: 256Mi }
      applicationController:
        requests: { cpu: 250m, memory: 256Mi }
        limits: { cpu: "1", memory: 512Mi }
      valkey:
        requests: { cpu: 50m, memory: 64Mi }
        limits: { cpu: 200m, memory: 128Mi }
  # Argo Workflows (Mode B — bundled CI / build / test). Vendored, unmodified upstream v4.0.7;
  # off by default; two retargetable images (fail-closed when empty). Coordinated via the generic
  # pipeline executor (M10.6) — the bundle DEPLOYS it; SCP never runs CI itself.
  argoWorkflows:
    enabled: false
    namespace: scp-argo-workflows
    # Upstream defaults (connected enable works out of the box); air-gap install.sh retargets.
    serverImage: quay.io/argoproj/argocli:v4.0.7 # argo-server / UI
    controllerImage: quay.io/argoproj/workflow-controller:v4.0.7 # workflow-controller
  # Argo Events (Mode B — event sources/sensors that can feed SCP's observe() path). Vendored,
  # unmodified upstream v1.9.10; off by default; one retargetable image.
  argoEvents:
    enabled: false
    namespace: scp-argo-events
    image: quay.io/argoproj/argo-events:v1.9.10 # argo-events controller — retargeted by install.sh
  # Harbor (Mode B — bundled OCI registry + Trivy scanner). OBSERVE-ONLY from SCP's side: SCP reads
  # image/scan state, never pushes (the credential-asymmetry invariant — SCP holds a scoped read
  # token, never Harbor's admin/infra creds). Vendored, unmodified upstream v2.15.1 MINUS its
  # Secrets; those are SCP-GENERATED per install (templates/harbor-secrets.yaml) rather than frozen
  # to static values — random, cross-referenced, persisted across upgrade via `lookup`. Off by default.
  harbor:
    enabled: false
    namespace: scp-harbor
    # Nine goharbor images, each retargeted INDIVIDUALLY so the air-gap install.sh can pin each by
    # @digest. Defaults are the upstream v2.15.1 refs so a CONNECTED apply works out of the box; the
    # air-gap install.sh rewrites all nine to `<registry>/<name>:<version>@<digest>`.
    coreImage: docker.io/goharbor/harbor-core:v2.15.1
    dbImage: docker.io/goharbor/harbor-db:v2.15.1
    jobserviceImage: docker.io/goharbor/harbor-jobservice:v2.15.1
    portalImage: docker.io/goharbor/harbor-portal:v2.15.1
    registryctlImage: docker.io/goharbor/harbor-registryctl:v2.15.1
    registryImage: docker.io/goharbor/registry-photon:v2.15.1
    nginxImage: docker.io/goharbor/nginx-photon:v2.15.1
    redisImage: docker.io/goharbor/redis-photon:v2.15.1
    trivyImage: docker.io/goharbor/trivy-adapter-photon:v2.15.1
    # Optional operator-set initial admin password; empty ⇒ SCP generates a random one (retrievable
    # from the harbor-core Secret's HARBOR_ADMIN_PASSWORD key). Never a static vendored default.
    adminPassword: ""
