name: CI

# Stages 1-4 (+5 Integration, +7 E2E) from BUILD_AND_TEST.md §6. Every stage is a plain pnpm
# command with no hosted-service dependency, so the same pipeline runs on self-hosted runners or
# a bare scripts/ci-local.sh (charter self-hosting requirement). Stage 5 (Integration) and stage 7
# (E2E)'s PR subset both gate every PR per §6 ("stages 1-6 are green, stage 7's PR subset is
# green"); E2E's full run stays main-only per the M0 definition of done.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: "1. Setup & build"
    runs-on: homelab-commanderscp-linux-general
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm build

  static-checks:
    name: "2. Static checks (lint + typecheck)"
    runs-on: homelab-commanderscp-linux-general
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm typecheck

  # CORRECTNESS gate: stale codegen means the committed spec/SDK don't match the routes, so every
  # downstream job would be testing a lie. This one SHOULD gate them (see `needs:` on integration/e2e).
  codegen-drift:
    name: "3. Codegen drift"
    runs-on: homelab-commanderscp-linux-general
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm build
      - run: pnpm gen
      - run: git diff --exit-code

  # POLICY gate, deliberately SEPARATE from the correctness gate above and depended on by NOTHING.
  #
  # The API is additive-only within /v1, but an intentional break is a legitimate, owner-approved
  # outcome via the `api-v2-exception` label (tools/openapi/check.sh's header, BUILD_AND_TEST.md §6).
  # This job therefore MUST NOT sit in any `needs:` chain: when it was bundled into "3. Codegen drift"
  # above, an approved break failed that job and SILENTLY SKIPPED integration + every E2E — which bit
  # us for real on PR #35 (the parent/child -> commander/outpost rename), a PR shipping a MIGRATION
  # that consequently got ZERO database coverage while every visible check looked fine. A policy gate
  # a human may override must never be able to cancel test execution.
  #
  # No build/gen here: job 3 above already proves the COMMITTED spec is byte-identical to the freshly
  # emitted one, so diffing the committed spec is equivalent and costs seconds instead of a full build.
  # fetch-depth: 0 so check.sh's `git merge-base origin/main HEAD` can resolve the base spec.
  api-breaking-change:
    name: "3b. API breaking-change gate (oasdiff, /v1 additive-only)"
    runs-on: homelab-commanderscp-linux-general
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: tools/openapi/check.sh

  unit-tests:
    name: "4. Unit tests"
    runs-on: homelab-commanderscp-linux-general
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm build
      # `homelab-commanderscp-linux-general` ships Node only — no Helm, cosign, skopeo, or Docker
      # (BUILD_AND_TEST.md §8 M1 item 9). `pnpm test` (turbo run test) must stay tool-free here so
      # this stage genuinely reflects "unit tests," not "unit tests plus whatever binaries happen
      # to be on this runner." Every tool-dependent check reachable from the default `test` task
      # (tools/helm-verify's `test` script; deploy/airgap's install.sh-tamper suite) probes for its
      # own binary and SKIPS (not fails) when absent — see tools/helm-verify/src/verify.ts's and
      # deploy/airgap/src/install-sh-tamper.test.ts's own comments. Those same assertions are
      # genuinely CI-gated elsewhere, with the tool actually installed first: helm-verify below
      # (job 4b) and the install.sh tamper suite in job 5 (Integration).
      - run: pnpm test

  helm-verify:
    name: "4b. Helm hardened-defaults gate (tools/helm-verify)"
    # Adversarial review MAJOR #4 on PR #15: the hardening tools/helm-verify asserts (non-root,
    # read-only-rootfs, dropped caps, seccomp, default-deny NetworkPolicy with no any-destination
    # DB-port egress, migrations-hook, least-priv DB creds, ingress mTLS annotations) genuinely
    # apply today, but the tool was never invoked anywhere in CI — "CI gate" was aspirational, not
    # real; a values.yaml regression would have shipped silently. This job is the actual gate: it
    # fails the build on any of those assertions regressing. Pure `helm template` (offline
    # rendering, no live cluster) — the general runner is sufficient, no Docker needed.
    #
    # Helm is a documented toolchain prerequisite (BUILD_AND_TEST.md §1) but is NOT pre-provisioned
    # on `homelab-commanderscp-linux-general` (confirmed by this job going red on PR #15 with
    # `spawnSync helm ENOENT` before this fix) — so this job installs a real Helm binary itself
    # (`azure/setup-helm@v4`, a static-binary download, no sudo/apt needed) rather than assuming
    # it's already on PATH. That makes this job an unconditional real gate on every PR regardless
    # of runner provisioning: `tools/helm-verify/src/verify.ts` SKIPS cleanly when helm is absent
    # (see its own comment) precisely so the general unit-test stage stays green, but THIS job
    # always has helm, so the same script here always genuinely renders the chart and asserts.
    runs-on: homelab-commanderscp-linux-general
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: "Install Helm (BUILD_AND_TEST.md §1: 3.16+) — general runner ships Node only"
        uses: azure/setup-helm@v4
        with:
          version: latest
      - run: pnpm build
      - run: pnpm --filter @scp/helm-verify test

  integration:
    name: "5. Integration (Testcontainers Postgres + managed-iac real-Docker container)"
    # Needs a real Docker daemon for Testcontainers — the general runner has none
    # (BUILD_AND_TEST.md §8 M1 item 9). M7: `pnpm test:integration` (turbo run test:integration)
    # automatically picks up @scp/plugin-managed-iac's own test:integration script too (turbo
    # discovers it from that package's package.json, no separate wiring needed) — the DoD-critical
    # "launches a REAL scp-runner-iac container" test therefore runs in THIS job, on the same
    # docker-build runner, rather than needing a second CI job. Every push/PR (not main-only): this
    # is a permanent regression test, same gating as the Testcontainers suite it sits alongside.
    #
    # This job also makes the CRITICAL #1 air-gap guard (adversarial review of PR #15:
    # `deploy/airgap/src/install-sh-tamper.test.ts` — a bundle re-signed with an attacker's
    # keypair must be REJECTED against the real external `--pubkey`, exercised against the actual
    # `install.sh` subprocess, not a reimplementation) a REAL gate on every PR. That suite's
    # tool-dependent `describe` block probes `cosign`/`skopeo`/`helm` on PATH and SKIPS when any
    # are absent (see the test file's own comment) — which is what keeps `pnpm test` green on the
    # tool-free general runner (job 4). None of those three are pre-provisioned on THIS runner
    # either by default, so the steps below install them for real before re-running
    # `@scp/airgap`'s suite explicitly (it's not part of the `test:integration` task graph — its
    # script is named `test`, and Turborepo only wires the `test:integration` task to packages
    # that declare that exact script name) — with all three tools genuinely on PATH, the tamper
    # scenario actually executes here instead of skipping.
    runs-on: homelab-commanderscp-linux-docker-build
    needs: [static-checks, codegen-drift, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: "Install Helm (BUILD_AND_TEST.md §1: 3.16+)"
        uses: azure/setup-helm@v4
        with:
          version: latest
      - name: Install the PINNED cosign (the same binary the scp image ships)
        # PINNED, not `sigstore/cosign-installer@v3` (M17.3 E1). Two reasons the unpinned network
        # installer had to go: (1) it installed whatever cosign it felt like, so CI validated a
        # DIFFERENT binary than production runs — the tamper suite below is only meaningful if it
        # exercises the shipped one; (2) charter principle 5 wants CI offline-capable, and a
        # digest-pinned, content-addressed image pull can be served by a local mirror whereas an
        # unpinned release download cannot. The script extracts /ko-app/cosign from the pinned
        # image (tools/cosign/pin.env) and fails closed if `cosign version` != the pin.
        run: scripts/install-pinned-cosign.sh
      - name: Point @scp/airgap at the pinned cosign
        # Makes the resolution in deploy/airgap/src/cosign-bin.ts take the PINNED branch here
        # (static flag set + fail-closed version assertion), so CI exercises exactly the path the
        # runtime image takes. install.sh's own requirement is unaffected: it still finds an
        # EXTERNAL cosign on PATH, which is the trust model it must keep.
        run: echo "SCP_COSIGN_BIN=/usr/local/bin/cosign" >> "$GITHUB_ENV"
      - name: Install skopeo (BUILD_AND_TEST.md §1) — no-op if the runner already has it
        run: |
          command -v skopeo >/dev/null 2>&1 && exit 0
          sudo apt-get update -qq
          sudo apt-get install -y -qq skopeo
      - run: pnpm build
      - run: pnpm test:integration
      # Explicit, not part of test:integration's task graph (see comment above) — this is the
      # ONLY place in CI these tool-dependent assertions run for real rather than skip.
      - name: Air-gap install.sh tamper-rejection suite (CRITICAL #1 real gate — cosign/skopeo/helm now on PATH)
        run: pnpm --filter @scp/airgap test

  e2e-m0:
    name: "7. E2E (M0 golden path, main only)"
    runs-on: homelab-commanderscp-linux-docker-build
    needs: [static-checks, codegen-drift, unit-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm build
      - run: bash scripts/e2e-m0.sh

  e2e-m4:
    name: "8. E2E (M4 governance golden path, main only)"
    # Same reason as e2e-m0: needs a real Docker daemon (compose) — the general runner has none.
    runs-on: homelab-commanderscp-linux-docker-build
    needs: [static-checks, codegen-drift, unit-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm build
      - run: bash scripts/e2e-m4.sh

  e2e-m5:
    name: "8b. E2E (M5 campaigns & initiatives golden path, main only)"
    # Same reason as e2e-m0/e2e-m4: needs a real Docker daemon (compose) — the general runner has none.
    runs-on: homelab-commanderscp-linux-docker-build
    needs: [static-checks, codegen-drift, unit-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm build
      - run: bash scripts/e2e-m5.sh

  e2e-m6:
    name: "8c. E2E (M6 federation two-domain round-trip, main only)"
    # Same reason as e2e-m0/e2e-m4/e2e-m5: needs a real Docker daemon (compose) — the general
    # runner has none. This one needs it twice over: the compose stack itself runs TWO fully
    # isolated scpd+postgres pairs on separate Docker networks with no shared network at all
    # (DESIGN.md §13's "no network path exists between the domains" requirement, enforced
    # structurally by Docker's own network isolation, not a firewall rule).
    runs-on: homelab-commanderscp-linux-docker-build
    needs: [static-checks, codegen-drift, unit-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm build
      - run: bash scripts/e2e-m6.sh

  e2e-m7:
    name: "8d. E2E (M7 real executor integrations golden path, main only)"
    # Same reason as e2e-m0/e2e-m4/e2e-m5/e2e-m6: needs a real Docker daemon (compose) — the
    # general runner has none. HONEST SCOPE (see scripts/e2e-m7.sh's own header comment): this
    # proves the M7 API/CLI surface end to end — webhook HMAC signature verification (fail-closed),
    # executor/notification binding CRUD, the plugin-manifest catalog, and discovery's
    # never-auto-commits guarantee — against the real compose-deployed image. It does NOT include
    # an ArgoCD-in-kind wave-execution variant (deferred, flagged in the M7 PR body); real
    # GitHub/ArgoCD/Terraform wire-format coverage comes from each plugin's deterministic
    # nock-fixture suite (unit-tests job) plus the opt-in nightly-live-sandbox.yml workflow.
    runs-on: homelab-commanderscp-linux-docker-build
    needs: [static-checks, codegen-drift, unit-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm build
      - run: bash scripts/e2e-m7.sh

  ci-image:
    name: "9a. Ensure CI runner image in GHCR (tools/ci-image, main only)"
    # BUILD_AND_TEST.md §6's versioned CI runner image (Node 22, corepack-pinned pnpm + a warmed
    # store, Playwright's Chromium + OS deps version-matched to pnpm-lock.yaml, the Docker CLI +
    # compose plugin, the vendored oasdiff binary — see tools/ci-image/Dockerfile).
    #
    # Model: BUILD ONCE -> PUBLISH TO GHCR -> PULL (this realizes what the Dockerfile header and
    # tools/ci-image/README.md previously flagged as a follow-up). The image is tagged by a content
    # hash of the only two inputs that determine it — tools/ci-image/Dockerfile + pnpm-lock.yaml —
    # so it is rebuilt ONLY on a cache miss (the toolchain/lockfile actually changed); every other
    # main push just pulls it. That kills both the per-push multi-GB rebuild AND the per-push
    # dependency on cdn.playwright.dev: the Chromium download now happens only on a cache miss,
    # with retries baked into the Dockerfile — closing the air-gap gap the build-every-push
    # approach had (CLAUDE.md #5, CI runs offline). Auth is the workflow's GITHUB_TOKEN (repo is
    # private -> the package is private); no extra secret, assuming the org permits GITHUB_TOKEN
    # packages:write (the same GHCR publish model the homelab already uses).
    runs-on: homelab-commanderscp-linux-docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Compute the toolchain image tag (hash of Dockerfile + lockfile)
        id: img
        run: echo "ref=ghcr.io/commanderscp/scp-ci-image:$(cat tools/ci-image/Dockerfile pnpm-lock.yaml | sha256sum | cut -c1-16)" >> "$GITHUB_OUTPUT"
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Pull the pre-built image, or build+push once on a cache miss (toolchain changed)
        run: |
          IMAGE="${{ steps.img.outputs.ref }}"
          if docker pull "$IMAGE"; then
            echo "cache hit: $IMAGE already in GHCR — no build needed."
          else
            echo "cache miss: building $IMAGE (Dockerfile/lockfile changed) and pushing to GHCR."
            docker build -f tools/ci-image/Dockerfile -t "$IMAGE" .
            docker push "$IMAGE"
          fi

  e2e-web:
    name: "9. E2E (Web UI, Playwright/Chromium, main only)"
    # Same reason as e2e-m0: needs a real Docker daemon (compose) — the general runner has none.
    runs-on: homelab-commanderscp-linux-docker-build
    needs: [static-checks, codegen-drift, unit-tests, ci-image]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Compute the same toolchain image tag as the ci-image job
        id: img
        run: echo "ref=ghcr.io/commanderscp/scp-ci-image:$(cat tools/ci-image/Dockerfile pnpm-lock.yaml | sha256sum | cut -c1-16)" >> "$GITHUB_OUTPUT"
      - name: Log in to GHCR and pull the baked CI runner image
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker pull "${{ steps.img.outputs.ref }}"

      # Everything scripts/e2e-web.sh needs — Node 22, pnpm + its pre-warmed store, Playwright's
      # Chromium + its OS-level deps, the Docker CLI + compose plugin — is baked into
      # tools/ci-image (see that Dockerfile's header comment). This replaces the old
      # actions/cache-plus-network-fetch-on-cache-miss Playwright install entirely: zero network
      # calls for tooling in this job, cache hit or miss, full stop. `pnpm install --offline
      # --frozen-lockfile` resolves entirely from the store baked into the image — see the
      # Dockerfile's `npm_config_store_dir` comment for why that explicit env var, not just a
      # warm store, is what makes this actually work offline against a bind-mounted checkout
      # (pnpm otherwise silently relocates the store when the checkout and the image's own
      # filesystem are on different devices, which they always are here).
      #
      # `-v /var/run/docker.sock:/var/run/docker.sock`: Docker-outside-of-Docker — this
      # container's own `docker compose build/up` calls (inside scripts/e2e-web.sh) drive the
      # RUNNER's Docker daemon as sibling containers, not a nested daemon; the build context those
      # compose commands send is streamed from THIS container's view of /workspace (the checked-out
      # commit), which is the normal Docker client/server contract, not a shared-path assumption.
      # `--network host`: lets Playwright, running inside this container, reach the compose
      # stack's host-published port (http://localhost:8080, per scripts/e2e-web.sh) the same way
      # it would running directly on the runner. Linux-only, which is fine — every runner in this
      # workflow is homelab-commanderscp-linux-*.
      #
      # HONEST SCOPE / ASSUMPTION flagged for whoever lands this on the real homelab runners: the
      # Docker-outside-of-Docker + `--network host` pattern above was verified locally (Docker
      # CLI + `docker compose` from inside a tools/ci-image container reaching a real host
      # daemon; a fully offline `pnpm install --offline --frozen-lockfile` against the baked
      # store; a Chromium launch inside a `--network none` container) but NOT against an actual
      # run of this exact job on the homelab self-hosted runners — if those runners are
      # container-per-job (e.g. Actions Runner Controller pods) rather than plain VMs/hosts, the
      # docker.sock bind-mount and `--network host` may need runner-specific adjustment. See the
      # m8-hardening-packaging-rc PR description for the full list of what was and wasn't tested.
      - name: Run compose-stack Playwright E2E inside the baked CI runner image (zero network)
        run: |
          docker run --rm \
            --network host \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$(pwd):/workspace" -w /workspace \
            "${{ steps.img.outputs.ref }}" \
            bash -c "pnpm install --offline --frozen-lockfile && bash scripts/e2e-web.sh"
