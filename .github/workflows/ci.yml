name: CI

# Stages 1-4 from BUILD_AND_TEST.md §6 (M0 scope). Every stage is a plain pnpm command with no
# hosted-service dependency, so the same pipeline runs on self-hosted runners or a bare
# scripts/ci-local.sh (charter self-hosting requirement). Stage 5 (E2E) runs only on pushes to
# main, per the M0 definition of done.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: "1. Setup & build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm build

  static-checks:
    name: "2. Static checks (lint + typecheck)"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm typecheck

  codegen-drift:
    name: "3. Codegen drift"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm build
      - run: pnpm gen
      - run: git diff --exit-code

  unit-tests:
    name: "4. Unit tests"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm build
      - run: pnpm test

  e2e-m0:
    name: "5. E2E (M0 golden path, main only)"
    runs-on: ubuntu-latest
    needs: [static-checks, codegen-drift, unit-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm build
      - run: bash scripts/e2e-m0.sh
