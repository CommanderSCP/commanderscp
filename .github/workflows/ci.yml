name: CI

# Stages 1-4 (+5 Integration, +7 E2E) from BUILD_AND_TEST.md §6. Every stage is a plain pnpm
# command with no hosted-service dependency, so the same pipeline runs on self-hosted runners or
# a bare scripts/ci-local.sh (charter self-hosting requirement). Stage 5 (Integration) and stage 7
# (E2E)'s PR subset both gate every PR per §6 ("stages 1-6 are green, stage 7's PR subset is
# green"); E2E's full run stays main-only per the M0 definition of done.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: "1. Setup & build"
    runs-on: homelab-commanderscp-linux-general
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm build

  static-checks:
    name: "2. Static checks (lint + typecheck)"
    runs-on: homelab-commanderscp-linux-general
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm typecheck

  codegen-drift:
    name: "3. Codegen drift"
    runs-on: homelab-commanderscp-linux-general
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm build
      - run: pnpm gen
      - run: git diff --exit-code

  unit-tests:
    name: "4. Unit tests"
    runs-on: homelab-commanderscp-linux-general
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm build
      - run: pnpm test

  integration:
    name: "5. Integration (Testcontainers Postgres)"
    # Needs a real Docker daemon for Testcontainers — the general runner has none
    # (BUILD_AND_TEST.md §8 M1 item 9).
    runs-on: homelab-commanderscp-linux-docker-build
    needs: [static-checks, codegen-drift, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm build
      - run: pnpm test:integration

  e2e-m0:
    name: "7. E2E (M0 golden path, main only)"
    runs-on: homelab-commanderscp-linux-docker-build
    needs: [static-checks, codegen-drift, unit-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm build
      - run: bash scripts/e2e-m0.sh

  e2e-m4:
    name: "8. E2E (M4 governance golden path, main only)"
    # Same reason as e2e-m0: needs a real Docker daemon (compose) — the general runner has none.
    runs-on: homelab-commanderscp-linux-docker-build
    needs: [static-checks, codegen-drift, unit-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm build
      - run: bash scripts/e2e-m4.sh

  e2e-m5:
    name: "8b. E2E (M5 campaigns & initiatives golden path, main only)"
    # Same reason as e2e-m0/e2e-m4: needs a real Docker daemon (compose) — the general runner has none.
    runs-on: homelab-commanderscp-linux-docker-build
    needs: [static-checks, codegen-drift, unit-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm build
      - run: bash scripts/e2e-m5.sh

  e2e-web:
    name: "9. E2E (Web UI, Playwright/Chromium, main only)"
    # Same reason as e2e-m0: needs a real Docker daemon (compose) — the general runner has none.
    runs-on: homelab-commanderscp-linux-docker-build
    needs: [static-checks, codegen-drift, unit-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm build
      - run: pnpm --filter @scp/web build

      # Playwright's Chromium is NOT baked into a versioned CI runner image yet — there is no
      # `tools/ci-image` in this repo (checked). Standing up a full CI-image-build pipeline is out
      # of scope for this stage and is tracked as follow-up work. This is the next-best, honestly
      # documented approach instead: cache the downloaded browser (+ its OS-level deps) keyed on
      # the resolved `@playwright/test` version, so it downloads once and is reused across runs.
      # On a cache MISS (first run, cache eviction, or a Playwright version bump) `playwright
      # install --with-deps` fetches Chromium and its OS packages from the network — a known,
      # documented, TEMPORARY air-gap exception scoped to this one CI job only. Every other CI
      # stage, and the product itself, makes zero runtime network calls (CLAUDE.md principle 5).
      - name: Resolve @playwright/test version (cache key)
        id: playwright-version
        run: |
          echo "version=$(node -p "require('./apps/web/node_modules/@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright's Chromium (network fetch on cache miss only)
        run: npx --prefix apps/web playwright install --with-deps chromium

      - run: bash scripts/e2e-web.sh
