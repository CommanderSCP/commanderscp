name: Deploy Drills (M8 kind / air-gap / Ansible)

# The three heavy M8 deployment drills (BUILD_AND_TEST.md §8 M8 DoD). These are OPT-IN
# (workflow_dispatch + nightly schedule), NEVER merge-gating — same posture as
# nightly-live-sandbox.yml. Why not per-PR gates:
#   - The kind + air-gap drills stand up a full `kind` Kubernetes cluster (and, for air-gap, a
#     Calico CNI so NetworkPolicy is genuinely enforced). Whether the self-hosted
#     `homelab-commanderscp-linux-docker-build` runner supports nested-kind reliably was NOT
#     verifiable from the environment this milestone was built in — so per the milestone's own
#     "be HONEST about what's CI-gated vs. manual, don't fake it" instruction, these run here,
#     nightly/on-demand, not as a merge gate.
#   - Each drill is minutes-long (two full image builds + a bundle build + cluster bring-up).
#
# STATUS (M9.4, 2026-07-12): all three drills RUN GREEN on the homelab
# `homelab-commanderscp-linux-docker-build` ARC runner — nested-kind IS viable there (the M8 open
# question, now answered). Recorded green runs:
#   * scripts/kind-drill.sh    — install (old image) -> golden path -> zero-downtime helm upgrade
#                                (a REAL new migration applied while old pods served) -> data
#                                preserved -> rollback.  Green: run 29194162892.
#   * scripts/ansible-drill.sh — scp.platform Ansible collection drives a real signed-bundle compose
#                                install then upgrade, health-checked.  Green: run 29194484761.
#   * scripts/airgap-drill.sh  — genuine zero-egress drill (kind + Calico-enforced default-deny + a
#                                deliberate-egress-attempt that MUST fail + golden path from a local
#                                registry via the signed bundle).  Green: run 29196926938.
# Getting them green on the ARC runner (vs. a plain workstation) needed the M9.4 fixes on this
# branch: install kind/kubectl/helm/skopeo/cosign in-workflow; KUBECONFIG isolation + context-
# namespace pin (an ARC pod's ambient in-cluster kubeconfig/SA-namespace otherwise leaks in);
# restart-robust one-time-password capture; a skopeo single-platform postgres load + a kind
# containerd-mirror local registry (docker-in-docker dual-addressing); and a real chart fix
# (digest-pinned image tags aren't valid k8s labels — deploy/helm _helpers.tpl). Kept nightly +
# on-demand, still NEVER merge-gating (each run is minutes-long: image builds + bundle + cluster).

on:
  schedule:
    - cron: "37 5 * * *" # nightly, off-peak, arbitrary minute
  workflow_dispatch:
    inputs:
      drill:
        description: "Which drill to run (all | kind | ansible | airgap | bundled-argocd)"
        required: false
        default: "all"

jobs:
  kind-drill:
    name: "kind: install -> golden path -> zero-downtime upgrade -> rollback"
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.drill == 'all' || github.event.inputs.drill == 'kind'
    runs-on: homelab-commanderscp-linux-docker-build
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # kind-drill.sh builds an "old" image from an earlier commit on this branch
      - uses: ./.github/actions/setup
      - run: pnpm build
      # Drill prerequisites (kind/kubectl/helm). Installed in-workflow via the same setup-action
      # pattern the `integration` CI job uses for helm/cosign/skopeo — a nightly/on-demand
      # build-time fetch, NOT a product runtime dependency, so it doesn't violate CLAUDE.md #5. The
      # homelab `linux-docker-build` runner ships Docker but not these k8s tools (confirmed by a
      # workflow_dispatch spike: `kind: command not found`); rather than bake them into the runner
      # image (homelab-runners, Rule #5), the drill self-provisions them.
      - name: Install helm
        uses: azure/setup-helm@v4
        with:
          version: latest
      - name: Install kubectl
        uses: azure/setup-kubectl@v4
      - name: Install kind (binary only — kind-drill.sh creates its own cluster)
        uses: helm/kind-action@v1
        with:
          install_only: true
          version: v0.27.0
      - name: Run the kind install/upgrade/rollback drill
        run: bash scripts/kind-drill.sh

  ansible-drill:
    name: "ansible: bundle -> compose install -> compose upgrade (scp.platform)"
    # Serialized after kind-drill (needs + always()): the three drills each stand up a full kind
    # cluster / compose stack, and running them CONCURRENTLY starved the single homelab node — a
    # `drill=all`/nightly run failed with Postgres transaction aborts + upgrade timeouts, while each
    # drill passes cleanly alone. `always()` keeps this independent of kind's result (it still runs
    # if kind failed or was skipped, e.g. `drill=ansible`); `needs` only orders them one-at-a-time.
    needs: kind-drill
    if: >-
      always() && (
      github.event_name == 'schedule' ||
      github.event.inputs.drill == 'all' || github.event.inputs.drill == 'ansible')
    runs-on: homelab-commanderscp-linux-docker-build
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm build
      # Drill prerequisites installed in-workflow (same pattern as the integration CI job) —
      # nightly/on-demand build-time fetch, not a product runtime dependency.
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Install skopeo + ansible
        run: |
          sudo apt-get update -qq
          command -v skopeo >/dev/null 2>&1 || sudo apt-get install -y -qq skopeo
          command -v ansible-playbook >/dev/null 2>&1 || sudo apt-get install -y -qq ansible
      - name: Run the Ansible-driven compose install+upgrade drill
        run: bash scripts/ansible-drill.sh

  airgap-drill:
    name: "air-gap: bundle -> local registry -> Calico zero-egress kind install"
    needs: ansible-drill  # serialized (see ansible-drill) so the three drills never contend on the single node
    if: >-
      always() && (
      github.event_name == 'schedule' ||
      github.event.inputs.drill == 'all' || github.event.inputs.drill == 'airgap')
    runs-on: homelab-commanderscp-linux-docker-build
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm build
      # Drill prerequisites installed in-workflow (same pattern as the integration CI job) —
      # nightly/on-demand build-time fetch, not a product runtime dependency.
      - name: Install helm
        uses: azure/setup-helm@v4
        with:
          version: latest
      - name: Install kubectl
        uses: azure/setup-kubectl@v4
      - name: Install kind (binary only — the drill creates its own cluster)
        uses: helm/kind-action@v1
        with:
          install_only: true
          version: v0.27.0
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Install skopeo
        run: |
          command -v skopeo >/dev/null 2>&1 && exit 0
          sudo apt-get update -qq
          sudo apt-get install -y -qq skopeo
      - name: Run the genuine zero-egress air-gap install drill
        run: bash scripts/airgap-drill.sh

  bundled-argocd-drill:
    name: "bundled Argo CD: install -> live token mint+store -> scoped-token auth -> idempotent re-mint"
    needs: airgap-drill  # serialized (see ansible-drill) so the drills never contend on the single node
    if: >-
      always() && (
      github.event_name == 'schedule' ||
      github.event.inputs.drill == 'all' || github.event.inputs.drill == 'bundled-argocd')
    runs-on: homelab-commanderscp-linux-docker-build
    # 55, not 40: the drill does a full scpd docker build + kind bring-up + in-cluster pull of the
    # heavy Argo CD stack + TWO helm operations (install, then the wrapper's upgrade), each with its
    # own --wait/--timeout up to ARGOCD_DRILL_INSTALL_TIMEOUT (900s default), plus the idempotency
    # re-run. The job ceiling must comfortably exceed the drill's own patience.
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm build
      # Drill prerequisites installed in-workflow (same pattern as kind-drill / the integration CI
      # job) — nightly/on-demand build-time fetch, not a product runtime dependency.
      - name: Install helm
        uses: azure/setup-helm@v4
        with:
          version: latest
      - name: Install kubectl
        uses: azure/setup-kubectl@v4
      - name: Install kind (binary only — the drill creates its own cluster)
        uses: helm/kind-action@v1
        with:
          install_only: true
          version: v0.27.0
      - name: Run the bundled Argo CD auto-wire E2E drill
        run: bash scripts/bundled-argocd-drill.sh
